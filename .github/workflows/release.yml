name: Release

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Require main for manual releases
        if: github.event_name == 'workflow_dispatch'
        run: |
          test "${GITHUB_REF}" = "refs/heads/main" || {
            echo "::error::workflow_dispatch releases must run from main"
            exit 1
          }

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  test:
    needs: check-version
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build:
    needs: [check-version, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            zigbuild_target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
            zigbuild_target: x86_64-apple-darwin
          - target: aarch64-unknown-linux-gnu
            zigbuild_target: aarch64-unknown-linux-gnu.2.17
          - target: x86_64-unknown-linux-gnu
            zigbuild_target: x86_64-unknown-linux-gnu.2.17
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/registry/src
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-${{ runner.arch }}-
      - id: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        continue-on-error: true
        env:
          SCCACHE_GHA_ENABLED: "true"
      - name: Enable sccache
        if: steps.sccache.outcome == 'success'
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - name: Cache mise cargo tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/mise/installs/cargo-*
          key: mise-cargo-tools-${{ runner.os }}-${{ runner.arch }}-zigbuild-${{ hashFiles('mise.toml') }}
          restore-keys: |
            mise-cargo-tools-${{ runner.os }}-${{ runner.arch }}-zigbuild-
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install_args: "rust zig cargo:cargo-zigbuild cosign syft bun"
          github_token: ${{ secrets.GH_READONLY_TOKEN || github.token }}
      - run: mise exec -- rustup target add ${{ matrix.target }}
      - name: Cache Cargo build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target
          key: cargo-target-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-release-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-release-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-release-${{ hashFiles('Cargo.lock') }}-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-release-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-release-${{ hashFiles('Cargo.lock') }}-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-release-
      - name: Cache macOS SDK
        if: contains(matrix.target, 'apple')
        id: sdk-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/macos-sdk
          key: macos-sdk-26.1
      - name: Download macOS SDK
        if: contains(matrix.target, 'apple') && steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/macos-sdk
          curl -fsSL "https://github.com/joseluisq/macosx-sdks/releases/download/26.1/MacOSX26.1.sdk.tar.xz" \
            | tar -xJ -C /tmp/macos-sdk
      - name: Set macOS SDKROOT
        if: contains(matrix.target, 'apple')
        run: |
          echo "SDKROOT=/tmp/macos-sdk/MacOSX26.1.sdk" >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=12.0" >> "$GITHUB_ENV"
      - name: Cache Bun modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('ui/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile --ignore-scripts
        working-directory: ui
      - run: bun run build
        working-directory: ui
      - name: Build
        env:
          ZIGBUILD_TARGET: ${{ matrix.zigbuild_target }}
        run: mise exec -- cargo zigbuild --release --locked -p parallax-cli --features embed-ui --target "$ZIGBUILD_TARGET"
      - name: Package
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          archive="parallax-${VERSION}-${TARGET}.tar.gz"
          tar -czf "$archive" -C "target/${TARGET}/release" parallax
          shasum -a 256 "$archive" | awk '{print $1}' > "$archive.sha256"
          echo "archive=$archive" >> "$GITHUB_ENV"
      - name: Sign, SBOM, and attest archive
        uses: ./.github/actions/sign-and-attest-archive
        with:
          archive: ${{ env.archive }}
      - name: Show sccache stats
        if: always() && steps.sccache.outcome == 'success'
        run: sccache --show-stats
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: parallax-${{ matrix.target }}
          path: |
            parallax-*.tar.gz
            parallax-*.tar.gz.sha256
            parallax-*.tar.gz.bundle
            parallax-*.tar.gz.sbom.json

  publish:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          assets=(
            artifacts/parallax-*.tar.gz
            artifacts/parallax-*.tar.gz.sha256
            artifacts/parallax-*.tar.gz.bundle
            artifacts/parallax-*.tar.gz.sbom.json
          )
          gh release create "$tag" \
            --verify-tag \
            --title "Parallax ${VERSION}" \
            --notes "Parallax ${VERSION}" \
            "${assets[@]}"
