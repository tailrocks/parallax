name: Publish Homebrew Preview

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homebrew-tap-publish
  cancel-in-progress: true

jobs:
  source-changed:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_repository.full_name == github.repository &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
      sha: ${{ steps.source.outputs.sha }}
    steps:
      - name: Resolve source SHA
        id: source
        env:
          DISPATCH_SHA: ${{ github.sha }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "sha=${DISPATCH_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${WORKFLOW_RUN_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.source.outputs.sha }}
          fetch-depth: 0

      - name: Classify changed paths
        id: filter
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "source=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sha="$SOURCE_SHA"
          old_sha=""
          formula_err=""
          if formula_body=$(curl -fsSL --max-time 30 "https://raw.githubusercontent.com/tailrocks/homebrew-tap/main/Formula/parallax-preview.rb" 2>&1); then
            old_sha=$(printf '%s\n' "$formula_body" | sed -n 's|^[[:space:]]*# source-sha: \([0-9a-f]\{40\}\)$|\1|p' | head -1)
          else
            formula_err="$formula_body"
            echo "::warning::failed to fetch homebrew-tap formula: ${formula_err}; falling open"
          fi

          if [ -n "$formula_err" ] || [ -z "$old_sha" ] || [ "$old_sha" = "$sha" ] \
             || ! git rev-parse --verify "${old_sha}^{commit}" >/dev/null 2>&1; then
            echo "source=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! { diff_files=$(git diff --name-only "${old_sha}...${sha}" 2>/tmp/diff.err); }; then
            diff_err=$(cat /tmp/diff.err)
            echo "::warning::diff failed for ${old_sha}...${sha}: ${diff_err}; falling open"
            echo "source=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          source=false
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in
              .github/workflows/preview.yml|Cargo.toml|Cargo.lock|rust-toolchain.toml|crates/**|ui/package.json|ui/pnpm-lock.yaml|ui/src/**|ui/vite.config.ts)
                source=true
                ;;
            esac
          done <<< "$diff_files"

          echo "source=$source" >> "$GITHUB_OUTPUT"

  build-preview:
    needs: source-changed
    if: needs.source-changed.outputs.source == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            zigbuild_target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
            zigbuild_target: x86_64-apple-darwin
          - target: aarch64-unknown-linux-gnu
            zigbuild_target: aarch64-unknown-linux-gnu.2.17
          - target: x86_64-unknown-linux-gnu
            zigbuild_target: x86_64-unknown-linux-gnu.2.17
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.source-changed.outputs.sha }}
      - name: Cache Rust toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.rustup/toolchains
            ~/.rustup/update-hashes
          key: rustup-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            rustup-${{ runner.os }}-${{ runner.arch }}-
      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/registry/src
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-${{ runner.arch }}-
      - id: sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        continue-on-error: true
        env:
          SCCACHE_GHA_ENABLED: "true"
      - name: Enable sccache
        if: steps.sccache.outcome == 'success'
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - name: Cache mise cargo tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/mise/installs/cargo-*
          key: mise-cargo-tools-${{ runner.os }}-${{ runner.arch }}-zigbuild-${{ hashFiles('mise.toml') }}
          restore-keys: |
            mise-cargo-tools-${{ runner.os }}-${{ runner.arch }}-zigbuild-
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install_args: "rust zig cargo:cargo-zigbuild cosign syft node pnpm"
          github_token: ${{ secrets.GH_READONLY_TOKEN }}
      - run: mise exec -- rustup target add ${{ matrix.target }}
      - name: Cache Cargo build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target
          key: cargo-target-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-preview-release-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-preview-release-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-preview-release-${{ hashFiles('Cargo.lock') }}-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-preview-release-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-preview-release-${{ hashFiles('Cargo.lock') }}-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-preview-release-
      - name: Cache macOS SDK
        if: contains(matrix.target, 'apple')
        id: sdk-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/macos-sdk
          key: macos-sdk-26.1
      - name: Download macOS SDK
        if: contains(matrix.target, 'apple') && steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/macos-sdk
          curl -fsSL "https://github.com/joseluisq/macosx-sdks/releases/download/26.1/MacOSX26.1.sdk.tar.xz" \
            | tar -xJ -C /tmp/macos-sdk
      - name: Set macOS SDKROOT
        if: contains(matrix.target, 'apple')
        run: |
          echo "SDKROOT=/tmp/macos-sdk/MacOSX26.1.sdk" >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=12.0" >> "$GITHUB_ENV"
      - run: mise exec -- pnpm install --frozen-lockfile
        working-directory: ui
      - run: mise exec -- pnpm build
        working-directory: ui
      - name: Build
        env:
          ZIGBUILD_TARGET: ${{ matrix.zigbuild_target }}
        run: mise exec -- cargo zigbuild --release --locked -p parallax-cli --features embed-ui --target "$ZIGBUILD_TARGET"
      - name: Package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          archive="parallax-${TARGET}.tar.gz"
          tar -czf "$archive" -C "target/${TARGET}/release" parallax
          shasum -a 256 "$archive" | awk '{print $1}' > "$archive.sha256"
          echo "archive=$archive" >> "$GITHUB_ENV"

      - name: Sign, SBOM, and attest archive
        uses: ./.github/actions/sign-and-attest-archive
        with:
          archive: ${{ env.archive }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: parallax-${{ matrix.target }}
          path: |
            parallax-${{ matrix.target }}.tar.gz
            parallax-${{ matrix.target }}.tar.gz.sha256
            parallax-${{ matrix.target }}.tar.gz.bundle
            parallax-${{ matrix.target }}.tar.gz.sbom.json

  publish-preview:
    needs: [source-changed, build-preview]
    if: needs.source-changed.outputs.source == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.source-changed.outputs.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute preview metadata
        id: meta
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FULL_SHA: ${{ needs.source-changed.outputs.sha }}
        run: |
          base_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          short_sha=$(printf '%s' "$FULL_SHA" | cut -c1-7)
          # shellcheck disable=SC2016
          graphql_query='query($owner: String!, $name: String!, $oid: GitObjectID!) { repository(owner: $owner, name: $name) { object(oid: $oid) { ... on Commit { history(first: 1) { totalCount } } } } }'
          commit_count=$(
            jq -cn \
              --arg query "$graphql_query" \
              --arg owner "$GITHUB_REPOSITORY_OWNER" \
              --arg name "${GITHUB_REPOSITORY#*/}" \
              --arg oid "$FULL_SHA" \
              '{query: $query, variables: {owner: $owner, name: $name, oid: $oid}}' |
              curl -fsSL \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Content-Type: application/json" \
                --data @- \
                https://api.github.com/graphql |
              jq -er '.data.repository.object.history.totalCount'
          )
          {
            echo "full_sha=$FULL_SHA"
            echo "short_sha=$short_sha"
            echo "version=${base_version}-preview.${commit_count}+${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Read platform SHA256s
        id: shas
        run: |
          {
            echo "arm64_macos=$(cat artifacts/parallax-aarch64-apple-darwin.tar.gz.sha256)"
            echo "x86_macos=$(cat artifacts/parallax-x86_64-apple-darwin.tar.gz.sha256)"
            echo "arm64_linux=$(cat artifacts/parallax-aarch64-unknown-linux-gnu.tar.gz.sha256)"
            echo "x86_linux=$(cat artifacts/parallax-x86_64-unknown-linux-gnu.tar.gz.sha256)"
          } >> "$GITHUB_OUTPUT"

      - name: Publish preview GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA: ${{ needs.source-changed.outputs.sha }}
        run: |
          set -euo pipefail
          notes="Preview build from [${SHA:0:7}](https://github.com/${GITHUB_REPOSITORY}/commit/${SHA})."
          assets=(
            artifacts/parallax-*.tar.gz
            artifacts/parallax-*.tar.gz.sha256
            artifacts/parallax-*.tar.gz.bundle
            artifacts/parallax-*.tar.gz.sbom.json
          )

          if view_output=$(gh release view preview --json tagName 2>&1); then
            echo "preview release exists: $view_output"
            gh release edit preview \
              --prerelease \
              --target "$SHA" \
              --title "Preview ${VERSION}" \
              --notes "$notes"
            gh release upload preview "${assets[@]}" --clobber
            exit 0
          fi

          status=$?
          if echo "$view_output" | grep -qiE 'release not found|not found|release does not exist'; then
            gh release create preview \
              --prerelease \
              --target "$SHA" \
              --title "Preview ${VERSION}" \
              --notes "$notes" \
              "${assets[@]}"
          else
            echo "::error::gh release view failed: $view_output"
            exit "$status"
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: tailrocks/homebrew-tap
          ref: main
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Verify preview alias
        run: |
          test -L homebrew-tap/Aliases/parallax@preview
          test "$(readlink homebrew-tap/Aliases/parallax@preview)" = "../Formula/parallax-preview.rb"

      - name: Extract previous preview SHA
        id: prev
        run: |
          old_sha=$(
            sed -n 's|^[[:space:]]*# source-sha: \([0-9a-f]\{40\}\)$|\1|p' \
              homebrew-tap/Formula/parallax-preview.rb | head -1
          )
          echo "old_sha=${old_sha}" >> "$GITHUB_OUTPUT"

      - name: Rewrite preview formula
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          FULL_SHA: ${{ steps.meta.outputs.full_sha }}
          ARM64_SHA256: ${{ steps.shas.outputs.arm64_macos }}
          X86_SHA256: ${{ steps.shas.outputs.x86_macos }}
          LINUX_ARM64_SHA256: ${{ steps.shas.outputs.arm64_linux }}
          LINUX_X86_SHA256: ${{ steps.shas.outputs.x86_linux }}
        run: |
          cat > homebrew-tap/Formula/parallax-preview.rb <<EOF
          # source-sha: ${FULL_SHA}
          class ParallaxPreview < Formula
            desc "Local-first observability for agent-assisted development"
            homepage "https://github.com/tailrocks/parallax"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/tailrocks/parallax/releases/download/preview/parallax-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM64_SHA256}"
              end
              on_intel do
                url "https://github.com/tailrocks/parallax/releases/download/preview/parallax-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_SHA256}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/tailrocks/parallax/releases/download/preview/parallax-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM64_SHA256}"
              end
              on_intel do
                url "https://github.com/tailrocks/parallax/releases/download/preview/parallax-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_X86_SHA256}"
              end
            end

            conflicts_with "tailrocks/tap/parallax", because: "preview and stable install the same binary"

            def install
              bin.install "parallax"
            end

            def caveats
              <<~EOS
                Start the local server (downloads a pinned GreptimeDB on first run):
                  parallax serve
                Then open http://127.0.0.1:4000 - quickstart:
                  https://github.com/tailrocks/parallax/blob/main/docs/guide/quickstart.md
              EOS
            end

            test do
              system "#{bin}/parallax", "--version"
            end
          end
          EOF

      - name: Commit preview formula
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          FULL_SHA: ${{ steps.meta.outputs.full_sha }}
          OLD_SHA: ${{ steps.prev.outputs.old_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/parallax-preview.rb
          if git diff --cached --quiet; then
            echo "Formula already current; nothing to commit."
            exit 0
          fi
          git commit -m "parallax@preview ${VERSION}" \
            -m "Source: https://github.com/tailrocks/parallax/compare/${OLD_SHA}...${FULL_SHA}" \
            -m "Co-authored-by: Codex <codex@openai.com>"
          git push origin main
