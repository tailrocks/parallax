# Parallax storage-benchmark candidates, pinned to the versions under analysis.
# Smoke tier: local disk only (object-storage/MinIO path added when that pass runs).
# Referenced by docs/research/storage-benchmark-prototype.md and
# docs/research/greptimedb-vs-clickhouse/local-benchmark-results.md.
#
# Bring up:   docker compose -f bench/compose.yml up -d
# Tear down:  docker compose -f bench/compose.yml down -v
name: parallax-bench

services:
  greptimedb:
    image: greptime/greptimedb:v1.0.2
    command: >
      standalone start
      --http-addr 0.0.0.0:4000
      --rpc-bind-addr 0.0.0.0:4001
      --mysql-addr 0.0.0.0:4002
      --postgres-addr 0.0.0.0:4003
    ports:
      - "4000:4000"   # HTTP API
      - "4002:4002"   # MySQL wire
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 3s
      timeout: 2s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:26.5.1.882
    ports:
      - "8123:8123"   # HTTP API
      - "9000:9000"   # native protocol
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 3s
      timeout: 2s
      retries: 20
