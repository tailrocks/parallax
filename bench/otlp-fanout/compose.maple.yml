# Overlay: Maple as a local chDB-binary container (no Tinybird).
# Usage: docker compose -f compose.yml -f compose.maple.yml up
# Then enable `maple` in rotel.env (ROTEL_EXPORTERS + per-signal lists).
name: parallax-otlp-fanout
services:
  maple:
    build:
      context: ./maple
      args:
        MAPLE_VERSION: "" # pin a release tag (empty = latest); installs prebuilt Linux bundle
    container_name: pfanout-maple
    restart: unless-stopped
    ports:
      # Maple serves OTLP + query API + dashboard on ONE internal port, fronted by
      # socat on the container's :4318 (it binds loopback-only). Publish the
      # dashboard/query API on host :8081. Rotel reaches OTLP at maple:4318 on the
      # lab network (host OTLP belongs to Rotel only, so 4318 is not host-published).
      - "8081:4318"
    volumes:
      - maple-data:/data
    networks: [lab]
volumes:
  maple-data:
